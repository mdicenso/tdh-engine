# Tema e opzioni del cruscotto TDH Engine — design "Istituzionale" (Swiss/enterprise)
[theme]
primaryColor = "#0e6b70"          # petrolio istituzionale
backgroundColor = "#f5f7f7"       # neutro freddo con bias teal
secondaryBackgroundColor = "#ffffff"  # card/widget bianchi
textColor = "#10262a"             # inchiostro (blu-petrolio scuro)
font = "sans serif"

[server]
fileWatcherType = "none"          # path OneDrive profondo: evita lo scan continuo
headless = true

[browser]
gatherUsageStats = false
